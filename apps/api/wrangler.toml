name = "unsaid-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "unsaid-db"
database_id = "REPLACE_WITH_YOUR_D1_ID"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "REPLACE_WITH_YOUR_KV_ID"
preview_id = "REPLACE_WITH_YOUR_PREVIEW_KV_ID"

[vars]
ALLOWED_ORIGINS = "https://unsaid.santi020k.com,https://www.unsaid.santi020k.com"
ENABLE_AUTO_TRANSLATION = "false"
TURNSTILE_ALLOWED_HOSTNAMES = "unsaid.santi020k.com,www.unsaid.santi020k.com"

# Local development values are loaded from apps/api/.dev.vars.
# Production secret is set once in Cloudflare and preserved by wrangler deploy:
# TURNSTILE_SECRET_KEY = "..."

[dev]
port = 8787
local_protocol = "http"
