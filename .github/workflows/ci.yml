name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 10.32.1

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: pnpm
          package-manager-cache: false

      - run: pnpm install --frozen-lockfile

      - run: pnpm spellcheck

      - run: pnpm turbo run lint check --filter=@unsaid/web --filter=@unsaid/api --filter=@unsaid/shared

  test:
    name: E2E & Accessibility
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 10.32.1

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: pnpm
          package-manager-cache: false

      - run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/web/package.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @unsaid/web exec playwright install chromium --with-deps

      - name: Install Playwright Chromium system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @unsaid/web exec playwright install-deps chromium

      - run: pnpm turbo run test --filter=@unsaid/web
        env:
          PUBLIC_API_URL: ${{ secrets.PUBLIC_API_URL || 'https://api.unsaid.santi020k.com' }}
          PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 10.32.1

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: pnpm
          package-manager-cache: false

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo run build
        env:
          PUBLIC_API_URL: ${{ secrets.PUBLIC_API_URL || 'https://api.unsaid.santi020k.com' }}
          PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}

  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 10.32.1

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: pnpm
          package-manager-cache: false

      - run: pnpm install --frozen-lockfile

      - name: Configure Cloudflare resource IDs
        run: |
          test -n "$CLOUDFLARE_D1_DATABASE_ID"
          test -n "$CLOUDFLARE_KV_NAMESPACE_ID"
          test -n "$CLOUDFLARE_PREVIEW_KV_NAMESPACE_ID"
          sed -i "s/REPLACE_WITH_YOUR_D1_ID/${CLOUDFLARE_D1_DATABASE_ID}/" apps/api/wrangler.toml
          sed -i "s/REPLACE_WITH_YOUR_KV_ID/${CLOUDFLARE_KV_NAMESPACE_ID}/" apps/api/wrangler.toml
          sed -i "s/REPLACE_WITH_YOUR_PREVIEW_KV_ID/${CLOUDFLARE_PREVIEW_KV_NAMESPACE_ID}/" apps/api/wrangler.toml
        env:
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
          CLOUDFLARE_PREVIEW_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_PREVIEW_KV_NAMESPACE_ID }}

      - name: Apply D1 migrations
        run: pnpm --filter @unsaid/api run db:migrate:remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        run: pnpm --filter @unsaid/api run deploy:worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-web:
    name: Deploy web (Worker)
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 10.32.1

      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: pnpm
          package-manager-cache: false

      - run: pnpm install --frozen-lockfile

      - name: Build and deploy Astro Worker
        run: pnpm turbo run deploy --filter=@unsaid/web
        env:
          PUBLIC_API_URL: ${{ secrets.PUBLIC_API_URL || 'https://api.unsaid.santi020k.com' }}
          PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
